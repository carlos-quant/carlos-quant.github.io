---
layout: default
---
<article>
  <div class="post-header">
    <div class="wrap">
      <div class="meta">
        {{ page.date | date: "%d %b %Y" }}
        {% if page.tag %} &middot; {{ page.tag }}{% endif %}
        {% if page.reading_time %} &middot; {{ page.reading_time }} min read{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
    </div>
  </div>
  <div class="wrap">
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</article>
